services:
  web:
    build: .
    container_name: mitologia_oraculo_web
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-mitologia_oraculo}
      DB_USER: ${MYSQL_USER:-oraculo_user}
      DB_PASS: ${MYSQL_PASSWORD:-oraculo_pass}
      DB_CHARSET: utf8mb4
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: mitologia_oraculo_db
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mitologia_oraculo}
      MYSQL_USER: ${MYSQL_USER:-oraculo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-oraculo_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-oraculo_root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/001-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    container_name: mitologia_oraculo_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
